function CommunityScreen({plants, plantPhotos, myAvatar, myNickname, onNicknameChange, onBack}){
  const [posts, setPosts] = useState(INIT_COMMUNITY_POSTS);
  const [liked, setLiked] = useState(new Set());
  const [showCompose, setShowCompose] = useState(false);
  const [showNickSetup, setShowNickSetup] = useState(false);
  const [nickDraft, setNickDraft] = useState("");
  const [newCaption, setNewCaption] = useState("");
  const [newPlant, setNewPlant] = useState(plants[0]?.nickname||"");
  const [openComment, setOpenComment] = useState(null);
  const [commentText, setCommentText] = useState("");
  const [filter, setFilter] = useState("전체");
  const fileRef = useRef();
  const [newPhoto, setNewPhoto] = useState(null);

  const displayName = myNickname || "나";

  const toggleLike = (id) => {
    setLiked(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
    setPosts(prev => prev.map(p => p.id===id ? {...p, likes: p.likes+(liked.has(id)?-1:1)} : p));
  };

  const handleComposePress = () => {
    if (!myNickname) { setNickDraft(""); setShowNickSetup(true); }
    else setShowCompose(true);
  };

  const saveNickAndCompose = () => {
    if (!nickDraft.trim()) return;
    onNicknameChange(nickDraft.trim());
    setShowNickSetup(false);
    setShowCompose(true);
  };

  const submitPost = () => {
    if(!newCaption.trim()) return;
    const post = {
      id: "c"+Date.now(),
      author: myNickname||"나",
      avatar: myAvatar||"🌱",
      plant: newPlant,
      caption: newCaption,
      emoji: "🌿",
      bg: "#EEF7B0",
      likes: 0,
      comments: [],
      time: "방금",
      photo: newPhoto,
    };
    setPosts(prev => [post, ...prev]);
    setNewCaption("");
    setNewPhoto(null);
    setShowCompose(false);
  };

  const submitComment = (postId) => {
    if(!commentText.trim()) return;
    setPosts(prev => prev.map(p => p.id===postId ? {
      ...p,
      comments:[...p.comments,{id:"r"+Date.now(),author:myNickname||"나",avatar:myAvatar||"🌱",text:commentText}]
    } : p));
    setCommentText("");
  };

  return (
    <div style={{height:"100%",minHeight:0,display:"flex",flexDirection:"column",background:"#F5F9E8",position:"relative"}}>
      {/* 헤더 */}
      <div style={{background:"#F5F9E8",padding:"16px 20px 20px",flexShrink:0}}>
        <button onClick={onBack} className="bp" style={{background:"none",border:"none",color:"rgba(255,255,255,0.85)",fontSize:13,fontWeight:600,cursor:"pointer",lineHeight:1,padding:"0",marginBottom:16,display:"flex",alignItems:"center",gap:4}}>
          <Mi name="arrow_back_ios_new" size={22} color="#1A2E00" />
        </button>
        <div style={{color:"#7A9A3A",fontSize:11,fontWeight:700,letterSpacing:1.5,marginBottom:6}}>COMMUNITY</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{color:"#2D5000",fontSize:24,fontWeight:800,lineHeight:1.15}}>식물 자랑 🌸</div>
          <button onClick={handleComposePress} style={{background:"#D4F06E",color:"#2D5000",border:"none",borderRadius:20,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}><span style={{display:"flex",alignItems:"center",gap:6}}><Mi name="edit" size={15} />자랑하기</span></button>
        </div>
        {/* 필터 */}
        <div style={{display:"flex",gap:8,marginTop:14,overflowX:"auto",paddingBottom:2}}>
          {["전체","최신","인기"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{flexShrink:0,background:filter===f?"#1A2E00":"rgba(0,0,0,0.06)",color:filter===f?"#fff":"#888",border:"none",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{f}</button>
          ))}
        </div>
      </div>

      {/* 피드 */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 90px"}}>
        {[...posts].sort((a,b)=>filter==="인기"?b.likes-a.likes:0).map((post,i)=>{
          const isLiked = liked.has(post.id);
          const showCmt = openComment===post.id;
          return (
            <div key={post.id} style={{background:"#fff",borderRadius:20,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.05)",overflow:"hidden",animation:"fadeIn 0.3s ease "+i*0.04+"s both"}}>
              {/* 포스트 헤더 */}
              <div style={{padding:"14px 16px 10px",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:post.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{post.avatar}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#2D5000"}}>{post.author}</div>
                  <div style={{fontSize:11,color:"#7A9A3A"}}>{post.plant} · {post.time}</div>
                </div>
              </div>

              {/* 이미지 영역 */}
              {post.photo ? (
                <img src={post.photo} alt="plant" style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/>
              ) : (
                <div style={{width:"100%",aspectRatio:"1",background:post.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:96}}>{post.emoji}</div>
              )}

              {/* 액션 바 */}
              <div style={{padding:"12px 16px 4px",display:"flex",alignItems:"center",gap:16}}>
                <button onClick={()=>toggleLike(post.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,padding:0}}>
                  <span style={{fontSize:22,transition:"transform 0.15s",transform:isLiked?"scale(1.3)":"scale(1)"}}><Mi name={isLiked?"favorite":"favorite_border"} size={16} color={isLiked?"#FF6B6B":"#B8C880"} /></span>
                  <span style={{fontSize:13,fontWeight:700,color:isLiked?"#E85555":"#B8C880"}}>{post.likes}</span>
                </button>
                <button onClick={()=>setOpenComment(showCmt?null:post.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,padding:0}}>
                  <span style={{fontSize:20}}><Mi name="chat_bubble" size={18} color="#7A9A3A" /></span>
                  <span style={{fontSize:13,fontWeight:700,color:"#B8C880"}}>{post.comments.length}</span>
                </button>
              </div>

              {/* 캡션 */}
              <div style={{padding:"4px 16px 14px"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#2D5000"}}>{post.author} </span>
                <span style={{fontSize:13,color:"#5A7A00"}}>{post.caption}</span>
              </div>

              {/* 댓글 섹션 */}
              {showCmt && (
                <div style={{borderTop:"1px solid #F0F7EE",padding:"12px 16px 14px"}}>
                  {post.comments.length===0 && (
                    <div style={{fontSize:12,color:"#B8C880",marginBottom:10}}>첫 댓글을 남겨보세요 🌱</div>
                  )}
                  {post.comments.map(c=>(
                    <div key={c.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-start"}}>
                      <span style={{fontSize:18,flexShrink:0}}>{c.avatar}</span>
                      <div style={{background:"#F5F9E8",borderRadius:12,padding:"6px 10px",flex:1}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#2D5000"}}>{c.author} </span>
                        <span style={{fontSize:12,color:"#5A7A00"}}>{c.text}</span>
                      </div>
                    </div>
                  ))}
                  {/* 댓글 입력 */}
                  <div style={{display:"flex",gap:8,marginTop:8,alignItems:"center"}}>
                    <span style={{fontSize:20}}>{myAvatar||"🌱"}</span>
                    <input
                      value={commentText}
                      onChange={e=>setCommentText(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&submitComment(post.id)}
                      placeholder="댓글 달기..."
                      style={{flex:1,border:"1.5px solid #D8F3DC",borderRadius:20,padding:"8px 14px",fontSize:12,fontFamily:"inherit",outline:"none",background:"#F8FCF8"}}
                    />
                    <button onClick={()=>submitComment(post.id)} style={{background:"#4A7C00",color:"#fff",border:"none",borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>등록</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 닉네임 설정 모달 */}
      {showNickSetup && (
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"0 32px"}} onClick={()=>setShowNickSetup(false)}>
          <div style={{background:"#fff",borderRadius:24,padding:"28px 24px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:10}}>🌸</div>
              <div style={{fontSize:17,fontWeight:800,color:"#2D5000",marginBottom:6}}>커뮤니티 닉네임 설정</div>
              <div style={{fontSize:13,color:"#7A9A3A",lineHeight:1.5}}>커뮤니티에서 사용할 닉네임이에요.<br/>가족에게는 본명으로 표시돼요.</div>
            </div>
            <div style={{background:"#F5F9E8",borderRadius:14,padding:"4px 4px 4px 14px",display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <span style={{fontSize:13,color:"#7A9A3A",fontWeight:700,flexShrink:0}}>@</span>
              <input
                value={nickDraft}
                onChange={e=>setNickDraft(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&saveNickAndCompose()}
                placeholder="닉네임 입력 (최대 12자)"
                maxLength={12}
                autoFocus
                style={{flex:1,background:"none",border:"none",outline:"none",fontSize:15,fontFamily:"inherit",color:"#2D5000",padding:"10px 0"}}
              />
            </div>
            <button onClick={saveNickAndCompose} disabled={!nickDraft.trim()} style={{width:"100%",background:nickDraft.trim()?"#4A7C00":"#B8C880",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:700,cursor:nickDraft.trim()?"pointer":"not-allowed",fontFamily:"inherit"}}><span style={{display:"flex",alignItems:"center",gap:6}}>설정하고 게시하기 <Mi name="arrow_forward" size={15} /></span></button>
            <div style={{textAlign:"center",marginTop:12}}>
              <span style={{fontSize:12,color:"#B8C880"}}>마이페이지에서도 변경할 수 있어요</span>
            </div>
          </div>
        </div>
      )}

      {/* 글쓰기 모달 */}
      {showCompose && (
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:200}} onClick={()=>setShowCompose(false)}>
          <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"24px 20px 40px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:800,color:"#2D5000",marginBottom:16}}><span style={{display:"flex",alignItems:"center",gap:6}}><Mi name="photo_library" size={20} color="#4A7C00" />식물 자랑하기</span></div>

            {/* 식물 선택 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#5A7A00",marginBottom:6}}>어떤 식물인가요?</div>
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                {plants.map(p=>(
                  <button key={p.id} onClick={()=>setNewPlant(p.nickname)} style={{flexShrink:0,background:newPlant===p.nickname?"#4A7C00":"#F5F9E8",color:newPlant===p.nickname?"#fff":"#5A7A00",border:"none",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    {p.emoji} {p.nickname}
                  </button>
                ))}
              </div>
            </div>

            {/* 사진 업로드 */}
            <div style={{marginBottom:12}}>
              <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const f=e.target.files[0]; if(!f) return;
                const r=new FileReader(); r.onload=ev=>setNewPhoto(ev.target.result); r.readAsDataURL(f);
              }}/>
              {newPhoto ? (
                <div style={{position:"relative",marginBottom:4}}>
                  <img src={newPhoto} style={{width:"100%",height:160,objectFit:"cover",borderRadius:14}}/>
                  <button onClick={()=>setNewPhoto(null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.5)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              ):(
                <button onClick={()=>fileRef.current.click()} style={{width:"100%",height:80,background:"#F5F9E8",border:"2px dashed #95D5B2",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",color:"#5A7A00",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>
                  📷 사진 추가 (선택)
                </button>
              )}
            </div>

            {/* 캡션 */}
            <textarea
              value={newCaption}
              onChange={e=>setNewCaption(e.target.value)}
              placeholder="우리 식물 자랑해봐요! 🌿"
              rows={3}
              style={{width:"100%",border:"1.5px solid #D8F3DC",borderRadius:14,padding:"12px 14px",fontSize:13,fontFamily:"inherit",outline:"none",resize:"none",boxSizing:"border-box",background:"#F8FCF8",marginBottom:14}}
            />
            <button onClick={submitPost} disabled={!newCaption.trim()} style={{width:"100%",background:newCaption.trim()?"#4A7C00":"#B8C880",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:700,cursor:newCaption.trim()?"pointer":"not-allowed",fontFamily:"inherit"}}><span style={{display:"flex",alignItems:"center",gap:6}}><Mi name="send" size={15} />게시하기</span></button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BOTTOM NAV (5탭: 일기 제거, 캘린더 통합) ─────────────────────────────────
function BottomNav({active,onNav,cartCount}){
  const tabs=[
    {key:"home",icon:"home",label:"홈"},
    {key:"plants",icon:"yard",label:"식물"},
    {key:"community",icon:"people",label:"커뮤니티"},
    {key:"shop",icon:"shopping_bag",label:"쇼핑",badge:cartCount},
    {key:"mypage",icon:"person",label:"마이"},
  ];
  return(
    <div style={{height:72,background:"#E4FF66",borderTop:"none",display:"flex",alignItems:"center",padding:"0 4px",flexShrink:0}}>
      {tabs.map(t=>(
        <button key={t.key} onClick={()=>onNav(t.key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"8px 2px",fontFamily:"inherit",position:"relative"}}>
          <Mi name={t.icon} size={24} color={active===t.key?"#1A2E00":"#888888"} style={{transition:"transform 0.2s",transform:active===t.key?"scale(1.1)":"scale(1)"}} />
          <span style={{fontSize:9,fontWeight:active===t.key?700:400,color:active===t.key?"#1A2E00":"#888888"}}>{t.label}</span>
          {active===t.key&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:18,height:3,background:"#1A2E00",borderRadius:2}}/>}
          {t.badge>0&&<div style={{position:"absolute",top:4,right:"18%",background:"#FF6B6B",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{t.badge}</div>}
        </button>
      ))}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
  </script>
</body>
</html>

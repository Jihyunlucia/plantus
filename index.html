// 로그/이벤트는 ISO 문자열로 저장, UI에서만 "오늘/어제/N일 전"으로 변환
const BASE_NOW = new Date("2026-04-04T08:00:00+09:00");
function isoOffset(days) {
  const d = new Date(BASE_NOW);
  d.setDate(d.getDate() - days);
  return d.toISOString();
}
function formatRelDate(isoStr) {
  if (!isoStr) return "";
  const d = new Date(isoStr);
  if (isNaN(d)) return "";
  const diff = Math.floor((BASE_NOW - d) / 86400000);
  if (diff === 0) return "오늘";
  if (diff === 1) return "어제";
  if (diff > 1 && diff < 7) return diff+"일 전";
  return (d.getMonth()+1)+"월 "+d.getDate()+"일";
}

// moisture = 물 준 직후 100에서 시작해 주기가 다 되면 0에 가깝게 선형 감소
// 단, 식물 특성에 따라 기저 수분 범위 다름 (다육은 건조 쪽이 정상)
function calcMoisture(lastWatered, water) {
  const ratio = Math.min(lastWatered / water, 1); // 0(방금 줌) ~ 1(주기 꽉 참)
  return Math.round((1 - ratio) * 100);
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(S.HOME);
  const [history, setHistory] = useState([]);
  const [selPlant, setSelPlant] = useState(null);
  const [selPost, setSelPost] = useState(null);
  const [tab, setTab] = useState("home");
  const [obStep, setObStep] = useState(0);
  const [addStep, setAddStep] = useState(0);
  const [cartCount, setCartCount] = useState(0);
  const [myPlants, setMyPlants] = useState(INIT_PLANTS);
  const [savedPosts, setSavedPosts] = useState([]);
  const [waterLog, setWaterLog] = useState(WATER_LOG_INIT);
  const [diaries, setDiaries] = useState(DIARY_INIT);
  const [waterModal, setWaterModal] = useState(null);
  const [diaryModal, setDiaryModal] = useState(null);
  const [myAvatar, setMyAvatar] = useState("🧑‍🌾");
  const [myNickname, setMyNickname] = useState("");
  const [plantPhotos, setPlantPhotos] = useState({}); // {plantId: dataUrl}
  const [familyMembers, setFamilyMembers] = useState(FAMILY_MEMBERS);
  const [doneUrgent, setDoneUrgent] = useState(new Set());
  const FC = "PLANT-7842";
  const IL = "restinplant.app/join/7842";

  

  useEffect(() => {
    if (diaryModal && screen === S.CALENDAR) go(S.DIARY_WRITE);
  }, [diaryModal]);

  // 탭 루트 화면들 (히스토리 스택 리셋)
  const ROOT_SCREENS = new Set([S.HOME, S.MY_PLANTS, S.CALENDAR, S.SHOP, S.MYPAGE, S.COMMUNITY]);

  const go = (sc, plant = null) => {
    if (plant) setSelPlant(plant);
    setHistory(prev => ROOT_SCREENS.has(sc) ? [] : [...prev, screen]);
    setScreen(sc);
  };

  const goBack = () => {
    if (history.length > 0) {
      const prev = history[history.length - 1];
      setHistory(h => h.slice(0, -1));
      setScreen(prev);
    } else {
      setScreen(S.HOME);
    }
  };

  const nav = (t) => {
    setTab(t);
    const m = { home:S.HOME, plants:S.MY_PLANTS, calendar:S.CALENDAR, shop:S.SHOP, mypage:S.MYPAGE, community:S.COMMUNITY };
    setHistory([]);
    setScreen(m[t]);
  };

  const showNav = [S.HOME,S.MY_PLANTS,S.CALENDAR,S.SHOP,S.MYPAGE,S.PLANT_DETAIL,
    S.NOTIFICATIONS,S.FAMILY,S.JOIN_FAMILY,S.ADD_PLANT,S.DIARY_WRITE,S.CONTENT_FEED,S.CONTENT_DETAIL,S.COMMUNITY].includes(screen);

  // 뒤로가기가 필요한 화면과 해당 목적지
  const backMap = {
    [S.PLANT_DETAIL]: ()=>go(S.MY_PLANTS),
    [S.ADD_PLANT]:    ()=>go(S.MY_PLANTS),
    [S.NOTIFICATIONS]:()=>go(S.HOME),
    [S.FAMILY]:       ()=>go(S.MYPAGE),
    [S.JOIN_FAMILY]:  ()=>go(S.MYPAGE),
    [S.DIARY_WRITE]:  ()=>go(S.CALENDAR),
  };
  const backFn = backMap[screen];

  // 스와이프 제스처
  const touchStartX = useRef(null);
  const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (dx > 60 && backFn) backFn();
    touchStartX.current = null;
  };

  const isFullScreen = false;

  return (
    <div
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
      style={{ width:"100%", height:"100%", background:"#F5F9E8", overflow:"hidden", position:"relative" }}>

        {/* 스플래시 / 온보딩 — 전체 화면 */}
        {screen===S.SPLASH && <SplashScreen />}
        {screen===S.ONBOARDING && <OnboardingScreen step={obStep} setStep={setObStep} onDone={()=>go(S.HOME)} />}

        {/* 일반 화면 — BottomNav 위 영역 */}
        {!isFullScreen && (
          <div style={{ position:"absolute", top:0, left:0, right:0, bottom:72, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            {screen===S.HOME && <HomeScreen plants={myPlants} notifs={NOTIFS} waterLog={waterLog} plantPhotos={plantPhotos} onPlant={p=>go(S.PLANT_DETAIL,p)} onNotif={()=>go(S.NOTIFICATIONS)} onWater={(notifId,plantId)=>{setDoneUrgent(prev=>new Set([...prev,notifId]));setWaterModal(plantId);}} doneUrgent={doneUrgent} onAllPlants={()=>go(S.MY_PLANTS)} onContent={()=>go(S.CONTENT_FEED)} savedPosts={savedPosts} onToggleSave={id=>setSavedPosts(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])} />}
            {screen===S.MY_PLANTS && <MyPlantsScreen plants={myPlants} plantPhotos={plantPhotos} onPlant={p=>go(S.PLANT_DETAIL,p)} onAdd={()=>{setAddStep(0);go(S.ADD_PLANT);}} onBack={goBack} />}
            {screen===S.PLANT_DETAIL && selPlant && <PlantDetailScreen plant={selPlant} waterLog={waterLog} plantPhotos={plantPhotos} onSetPhoto={(id,dataUrl)=>setPlantPhotos(prev=>({...prev,[id]:[...(prev[id]||[]),{id:Date.now(),dataUrl}]}))} onWater={()=>setWaterModal(selPlant.id)} onBack={goBack} />}
            {screen===S.ADD_PLANT && <AddPlantScreen step={addStep} setStep={setAddStep} onDone={(plant)=>{setMyPlants(prev=>[...prev,{...plant,id:Date.now()}]);go(S.MY_PLANTS);}} onBack={goBack} />}
            {screen===S.CALENDAR && <CalendarDiaryScreen plants={myPlants} diaries={diaries} waterLog={waterLog} onWriteDiary={(date)=>{setDiaryModal(date);}} onBack={goBack} />}
            {screen===S.DIARY_WRITE && <DiaryWriteScreen plants={myPlants} prefillDate={diaryModal} onBack={goBack} onSave={(entry)=>{setDiaries(prev=>[entry,...prev]);goBack();}} />}
            {screen===S.SHOP && <ShopScreen items={SHOP_ITEMS} cartCount={cartCount} onAdd={()=>setCartCount(c=>c+1)} onBack={goBack} />}
            {screen===S.NOTIFICATIONS && <NotificationsScreen items={NOTIFS} onBack={goBack} />}
            {screen===S.CONTENT_FEED && <ContentFeedScreen onBack={goBack} savedPosts={savedPosts} onToggleSave={id=>setSavedPosts(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])} onPost={post=>{setSelPost(post);go(S.CONTENT_DETAIL);}} />}
            {screen===S.CONTENT_DETAIL && selPost && <ContentDetailScreen post={selPost} onBack={goBack} savedPosts={savedPosts} onToggleSave={id=>setSavedPosts(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id])} />}
            {screen===S.COMMUNITY && <CommunityScreen plants={myPlants} plantPhotos={plantPhotos} myAvatar={myAvatar} myNickname={myNickname} onNicknameChange={setMyNickname} onBack={goBack} />}
            {screen===S.MYPAGE && <MyPageScreen members={familyMembers} FC={FC} IL={IL} waterLog={waterLog} plants={myPlants} myAvatar={myAvatar} onAvatarChange={setMyAvatar} myNickname={myNickname} onNicknameChange={setMyNickname} onFamily={()=>go(S.FAMILY)} onJoin={()=>go(S.JOIN_FAMILY)} onBack={goBack} />}
            {screen===S.FAMILY && <FamilyScreen members={familyMembers} onRemoveMember={id=>setFamilyMembers(prev=>prev.filter(m=>m.id!==id))} FC={FC} IL={IL} waterLog={waterLog} plants={myPlants} onJoin={()=>go(S.JOIN_FAMILY)} onBack={goBack} />}
            {screen===S.JOIN_FAMILY && <JoinFamilyScreen onJoin={()=>go(S.MYPAGE)} onBack={goBack} />}
          </div>
        )}

        {/* 하단 네비 — position:fixed 항상 화면 하단 고정 */}
        {!isFullScreen && (
          <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100}}>
            <BottomNav active={tab} onNav={nav} cartCount={cartCount} />
          </div>
        )}

        {waterModal && <WaterModal plantId={waterModal} plants={myPlants} members={familyMembers} onClose={()=>setWaterModal(null)} onSave={log=>{
          setWaterLog(prev=>[log,...prev]);
          if(log.action==="물주기"){
            setMyPlants(prev=>prev.map(p=>p.id!==log.plantId ? p : {
              ...p,
              lastWatered:0,
              nextWater:p.water,
              moisture:calcMoisture(0,p.water),
              alerts:p.alerts.filter(a=>!a.includes("물주기"))
            }));
          }
          setWaterModal(null);
        }} />}
    </div>
  )
}

// ─── SCREEN HEADER (공통 헤더 — 뒤로가기 포함) ──────────────────────────────
function ScreenHeader({label, sub, onBack, right, bg, dark}){
  const bgColor = bg || "#F5F9E8";
  const DARK_BGS=["#2D5000","#1A2E00","#4A7C00","#3D7A00","#2D6A4F","#1B4332"];
  const isDark=!!dark||DARK_BGS.indexOf(bgColor)>=0;
  const textPrimary=isDark?"#fff":"#1A2E00";
  const textSub=isDark?"rgba(255,255,255,0.7)":"#7A9A3A";
  const backColor=isDark?"rgba(255,255,255,0.85)":"#5A7A00";
  const borderC=isDark?"transparent":"#E8F2B0";
  return(
    <div style={{background:bgColor,padding:"16px 20px 20px",flexShrink:0,borderBottom:"1px solid "+borderC}}>
      {onBack&&(<button onClick={onBack} className="bp" style={{background:"none",border:"none",color:backColor,fontSize:13,cursor:"pointer",lineHeight:1,padding:"0",marginBottom:16,display:"flex",alignItems:"center"}}><Mi name="arrow_back_ios_new" size={22} color={backColor} /></button>)}
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
        <div>
          {sub&&<div style={{color:textSub,fontSize:11,fontWeight:700,letterSpacing:1.5,marginBottom:6}}>{sub}</div>}
          <div style={{color:textPrimary,fontSize:24,fontWeight:800,lineHeight:1.15}}>{label}</div>
        </div>
        {right}
      </div>
    </div>
  );
}


const OB=[{emoji:"🌱",title:"나만의 식물원\n만들기",sub:"75종 식물 DB로 쉽게 등록하고\n성장 기록을 남겨보세요",color:"#8DB800"},{emoji:"💧",title:"스마트 알림으로\n절대 잊지 않게",sub:"물주기·분갈이·흙 점검까지\n딱 맞는 시기에 알려드려요",color:"#6AAF00"},{emoji:"👨‍👩‍👧",title:"가족과 함께\n식물을 키워요",sub:"초대 코드로 가족을 초대하고\n누가 물 줬는지 함께 기록해요",color:"#6AAF00"}];
function OnboardingScreen({step,setStep,onDone}){
  const s=OB[step];
  const obBg="linear-gradient(160deg,"+s.color+",#D4F06E)";
  return(
    <div style={{width:"100%",height:"100%",background:obBg,display:"flex",flexDirection:"column",padding:"60px 32px 48px",animation:"fadeIn 0.4s ease"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:32}}>
        <div style={{fontSize:96}}>{s.emoji}</div>
        <div style={{textAlign:"center"}}>
          <div style={{color:"#1A2E00",fontSize:28,fontWeight:800,lineHeight:1.3,whiteSpace:"pre-line",marginBottom:16}}>{s.title}</div>
          <div style={{color:"rgba(26,46,0,0.7)",fontSize:15,lineHeight:1.7,whiteSpace:"pre-line"}}>{s.sub}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:32}}>
        {OB.map((_,i)=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?"#1A2E00":"rgba(0,0,0,0.2)",transition:"all 0.3s"}}/>)}
      </div>
      <button className="bp" onClick={()=>step<2?setStep(step+1):onDone()} style={{background:"#fff",color:"#1A2E00",border:"none",borderRadius:20,padding:"18px",fontSize:16,fontWeight:700,cursor:"pointer",width:"100%",fontFamily:"inherit",boxShadow:"0 4px 16px rgba(0,0,0,0.12)"}}>
        {step<2?"다음":"시작하기 🌿"}
      </button>
      {step<2&&<button onClick={onDone} style={{background:"rgba(255,255,255,0.3)",border:"none",color:"#1A2E00",fontSize:14,marginTop:16,cursor:"pointer",fontFamily:"inherit",padding:"8px 24px",borderRadius:20}}>건너뛰기</button>}
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomeScreen({plants,notifs,waterLog,plantPhotos,onPlant,onNotif,onWater,doneUrgent,onAllPlants,onContent,savedPosts,onToggleSave}){
  const urgent=notifs.filter(n=>n.urgent);
  const allDone=urgent.length>0&&urgent.every(n=>doneUrgent.has(n.id));
  const today=new Date();
  const yy=String(today.getFullYear()).slice(2);
  const mm=today.getMonth()+1;
  const dd=today.getDate();

  function fmtTime(log){
    const d=new Date(log.date);
    const now=new Date();
    const isToday=d.toDateString()===now.toDateString();
    const yest=new Date(now);yest.setDate(now.getDate()-1);
    const isYest=d.toDateString()===yest.toDateString();
    const t=log.time||"";
    if(!t) return isToday?"오늘":isYest?"어제":"";
    const h=parseInt(t.split(":")[0]);
    const min=t.split(":")[1]||"00";
    const ampm=h<12?"오전":"오후";
    const h12=(h%12)||12;
    const ts=ampm+" "+h12+":"+min;
    if(isToday) return "오늘 "+ts;
    if(isYest)  return "어제 "+ts;
    return mm+"월 "+dd+"일 "+ts;
  }

  // 식물 D-day 아이콘: 물주기면 💧, 분갈이면 🪴
  function getDIcon(p){
    if(p.alerts&&p.alerts.some(a=>a.includes("분갈이"))) return "🪴";
    return "💧";
  }

  return(
    <div style={{height:"100%",minHeight:0,overflowY:"auto",background:"#F5F9E8",paddingBottom:80}}>

      {/* ── 헤더 #E4FF66 ── */}
      <div style={{height:140,background:"#E4FF66",padding:"36px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:"#5A7000",marginBottom:5}}>{yy}년 {mm}월 {dd}일</div>
          <div style={{fontSize:26,fontWeight:800,color:"#1A2E00",letterSpacing:-0.5,lineHeight:1.2}}>안녕하세요!</div>
        </div>
        <button onClick={onNotif} className="bp" style={{marginTop:4,background:"none",border:"none",padding:4,cursor:"pointer",position:"relative",flexShrink:0}}>
          <Mi name="notifications" size={26} color="#1A2E00" />
          {urgent.length>0&&!allDone&&<span style={{position:"absolute",top:4,right:4,width:8,height:8,background:"#FF3B30",borderRadius:"50%",border:"1.5px solid #E4FF66"}}/>}
        </button>
      </div>

      {/* ── 본문 ── */}
      <div style={{padding:"20px 16px 0"}}>

        {/* ① 오늘 식물에게 해줄 것 */}
        <div style={{marginBottom:26}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:700,color:"#1A2E00"}}>오늘 식물에게 해줄 것</span>
            <span style={{fontSize:13,color:"#888",cursor:"pointer"}}>전체보기</span>
          </div>
          {allDone?(
            <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",textAlign:"center"}}>
              <div style={{fontSize:14,color:"#7A9A3A"}}>오늘 할 일을 모두 마쳤어요 ✨</div>
            </div>
          ):urgent.length>0?(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {urgent.map(n=>{
                const p=plants.find(pl=>pl.name===n.plant);
                const done=doneUrgent.has(n.id);
                const isWater=n.type==="water";
                const sub=p&&isWater
                  ? "마지막 물주기 "+p.lastWatered+"일 전 · 권장 "+p.water+"일"
                  : p&&n.type==="repot"
                  ? "분갈이 주기 "+p.repot+"일"
                  : n.msg;
                return(
                  <div key={n.id} style={{background:"#fff",borderRadius:14,padding:"14px 14px",display:"flex",alignItems:"center",gap:12,opacity:done?0.7:1}}>
                    <div style={{width:44,height:44,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:isWater?"#E6F2FF":"#F2EBE0",fontSize:20}}>
                      {n.emoji}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#1A2E00",marginBottom:2,textDecoration:done?"line-through":"none"}}>{n.plant}</div>
                      <div style={{fontSize:12,color:"#999"}}>{done?"완료!":sub}</div>
                    </div>
                    {done?(
                      <div style={{flexShrink:0,background:"#E4FF66",borderRadius:20,padding:"5px 16px",fontSize:13,fontWeight:700,color:"#1A2E00"}}>완료</div>
                    ):(
                      <button className="bp" onClick={()=>{if(p)onWater(n.id,p.id);}} style={{flexShrink:0,background:"#E4FF66",border:"none",borderRadius:20,padding:"5px 16px",fontSize:13,fontWeight:700,color:"#1A2E00",cursor:"pointer",fontFamily:"inherit"}}>완료</button>
                    )}
                  </div>
                );
              })}
            </div>
          ):(
            <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",textAlign:"center"}}>
              <div style={{fontSize:14,color:"#7A9A3A"}}>오늘은 할 일이 없어요 🌿</div>

          )}
        </div>

        {/* ② 내 식물 */}
        <div style={{marginBottom:26}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:700,color:"#1A2E00"}}>내 식물</span>
            <span onClick={onAllPlants} style={{fontSize:13,color:"#888",cursor:"pointer"}}>전체보기</span>
          </div>
          <div style={{display:"flex",gap:10,overflowX:"auto",marginLeft:-16,paddingLeft:16,marginRight:-16,paddingRight:16,paddingBottom:4,WebkitOverflowScrolling:"touch",scrollbarWidth:"none",msOverflowStyle:"none"}}>
            {plants.map(p=>{
              const photo=plantPhotos[p.id];
              const icon=getDIcon(p);
              const dColor=p.nextWater===0?"#FF3B30":"#4A7CC0";
              return(
                <button key={p.id} onClick={()=>onPlant(p)} className="bp" style={{flexShrink:0,width:100,background:"none",border:"none",padding:0,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                  <div style={{width:100,height:115,borderRadius:14,overflow:"hidden",marginBottom:8,background:p.bg||"#C8E8C0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42}}>
                    {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span>{p.emoji}</span>}
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:"#1A2E00",marginBottom:3}}>{p.nickname}</div>
                  <div style={{fontSize:12,fontWeight:500,color:dColor,display:"flex",alignItems:"center",justifyContent:"center",gap:2}}>
                    <span>{icon}</span><span>D-{p.nextWater}</span>
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* ③ 가족 활동 */}
        <div style={{marginBottom:26}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:700,color:"#1A2E00"}}>가족 활동</span>
            <span style={{fontSize:13,color:"#888",cursor:"pointer"}}>전체보기</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {waterLog.slice(0,3).map((log,i)=>{
              const plant=plants.find(p=>p.id===log.plantId);
              return(
                <div key={log.id||i} style={{background:"#fff",borderRadius:14,padding:"14px 14px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:"50%",flexShrink:0,background:"#F0F4E8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,overflow:"hidden"}}>
                    {log.memberAvatar}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#1A2E00",marginBottom:3,lineHeight:1.4}}>
                      {log.memberName} 님이 {plant?.nickname} {log.action} 완료
                    </div>
                    <div style={{fontSize:12,color:"#999"}}>{fmtTime(log)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ④ 나와 딱 맞는 식물 배너 */}
        <div style={{background:"#E4FF66",borderRadius:20,padding:"22px 20px",marginBottom:26,position:"relative",overflow:"hidden",minHeight:140,display:"flex",alignItems:"center"}}>
          <div style={{flex:1,zIndex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:"#1A2E00",lineHeight:1.35,marginBottom:8}}>나와 딱 맞는<br/>식물을 찾아보세요!</div>
            <div style={{fontSize:12,color:"#5A7000",lineHeight:1.6,marginBottom:16}}>성격, 라이프스타일 기반으로<br/>내 식물 유형을 알아봐요</div>
            <button className="bp" onClick={()=>window.open("https://jihyunlucia.github.io/rest-in-plants/","_blank")} style={{background:"#fff",border:"none",borderRadius:20,padding:"8px 18px",fontSize:13,fontWeight:700,color:"#1A2E00",cursor:"pointer",fontFamily:"inherit"}}>테스트 시작하기</button>
          </div>
          <div style={{position:"absolute",right:-10,bottom:-10,fontSize:110,lineHeight:1,opacity:0.85,transform:"rotate(-10deg)",userSelect:"none"}}>🌴</div>
        </div>

        {/* ⑤ 식물이 궁금하다면! */}
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:15,fontWeight:700,color:"#1A2E00"}}>식물이 궁금하다면!</span>
            <span onClick={onContent} style={{fontSize:13,color:"#888",cursor:"pointer"}}>전체보기</span>
          </div>
          <div style={{display:"flex",gap:10,overflowX:"auto",marginLeft:-16,paddingLeft:16,marginRight:-16,paddingRight:16,paddingBottom:4,WebkitOverflowScrolling:"touch",scrollbarWidth:"none",msOverflowStyle:"none"}}>
            {CONTENT_POSTS.map(post=>{
              const isSaved=savedPosts&&savedPosts.includes(post.id);
              return(
                <div key={post.id} onClick={onContent} style={{flexShrink:0,width:155,cursor:"pointer",position:"relative"}}>
                  <div style={{width:155,height:155,borderRadius:14,overflow:"hidden",marginBottom:8,background:post.bg||"#E8F4E0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:60,position:"relative"}}>

                    <button onClick={e=>{e.stopPropagation();onToggleSave&&onToggleSave(post.id);}} className="bp" style={{position:"absolute",top:8,right:8,background:"rgba(255,255,255,0.85)",border:"none",borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                      <Mi name={isSaved?"bookmark":"bookmark_border"} size={16} color={isSaved?"#4A7C00":"#999"} />

                  <div style={{fontSize:12,color:"#999",lineHeight:1.4}}>{post.desc}</div>
                </div>
              );
            })}
          </div>
        </div>

      </div>
    </div>
  );
}
// ─── MOISTURE BAR ─────────────────────────────────────────────────────────────
function getMoistureInfo(m) {
  if (m <= 25) return { label:"건조", emoji:"🏜️", color:"#E8784A", bg:"#FFF0E8", textColor:"#C1440E", tip:"물을 주세요!" };
  if (m <= 55) return { label:"보통", emoji:"🌤️", color:"#F0A500", bg:"#FFF8E0", textColor:"#A06800", tip:"적당해요" };
  if (m <= 80) return { label:"촉촉", emoji:"💧", color:"#6AAF00", bg:"#F3FAD0", textColor:"#1B5E38", tip:"좋아요" };
  return { label:"과습 주의", emoji:"🌊", color:"#457B9D", bg:"#E8F4FF", textColor:"#1D4E72", tip:"물 주지 마세요" };
}

// 수분값에 따라 그라데이션 색상 보간
function moistureColor(m) {
  if (m <= 25) {
    const t = m / 25;
    return "rgb("+232+","+Math.round(120 + t*  2)+","+Math.round(74 + t*0)+")";
  }
  if (m <= 55) {
    const t = (m - 25) / 30;
    return "rgb("+Math.round(232 - t*112)+","+Math.round(122 + t*23)+","+Math.round(74 - t*74)+")";
  }
  if (m <= 80) {
    const t = (m - 55) / 25;
    return "rgb("+Math.round(120 - t*51)+","+Math.round(145 + t*0)+","+Math.round(0 + t*108)+")";
  }
  return "#457B9D";
}

function MoistureBar({ moisture, compact }) {
  const info = getMoistureInfo(moisture);
  const fillColor = moistureColor(moisture);
  const p1 = Math.round(25/moisture*100);
  const p2 = Math.round(55/moisture*100);
  const fillGradient = "linear-gradient(90deg, #E8784A 0%, #F0A500 "+p1+"%, #40916C "+p2+"%, #457B9D 100%)";
  const SEGMENTS = [
    { label:"건조", end:25, color:"#E8784A" },
    { label:"보통", end:55, color:"#F0A500" },
    { label:"촉촉", end:80, color:"#6AAF00" },
    { label:"과습", end:100, color:"#457B9D" },
  ];

  if (compact) {
    return (
      <div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5 }}>
          <span style={{ fontSize:10, fontWeight:700, color:info.textColor }}>{info.emoji} {info.label}</span>
          <span style={{ fontSize:10, color:"#B8C880" }}>흙 수분</span>
        </div>
        {/* 트랙 */}
        <div style={{ position:"relative", height:8, background:"#EEF5EE", borderRadius:4 }}>
          {/* Fill — 실제 값만큼만 채움, 끝부분 색상 보간 */}
          <div style={{
            position:"absolute", left:0, top:0, bottom:0,
            width:moisture+"%",
            background:"linear-gradient(90deg, #E8784A 0%, #F0A500 35%, #40916C 70%, #457B9D 100%)",
            backgroundSize:100/(moisture/100)+"% 100%",
            borderRadius:4,
          }}/>
          {/* 마커 — fill 끝에 딱 붙음 */}
          <div style={{
            position:"absolute", top:"50%",
            left:"calc("+moisture+"% - 8px)",
            transform:"translateY(-50%)",
            width:16, height:16,
            background:"#fff",
            borderRadius:"50%",
            border:"3px solid "+fillColor,
            boxShadow:"0 1px 4px rgba(0,0,0,0.18)",
          }}/>
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
          {SEGMENTS.map((s,i) => (
            <span key={i} style={{ fontSize:9, color: moisture <= s.end && (i===0 || moisture > SEGMENTS[i-1].end) ? s.color : "#C4D4CA", fontWeight: moisture <= s.end && (i===0 || moisture > SEGMENTS[i-1].end) ? 700 : 400 }}>{s.label}</span>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* 상태 뱃지 + % */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ background:info.bg, borderRadius:20, padding:"6px 14px", display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:18 }}>{info.emoji}</span>
            <span style={{ fontSize:14, fontWeight:800, color:info.textColor }}>{info.label}</span>
          </div>
          <span style={{ fontSize:12, color:"#7A9A3A" }}>{info.tip}</span>
        </div>
        <span style={{ fontSize:22, fontWeight:900, color:fillColor }}>{moisture}%</span>
      </div>

      {/* 트랙 */}
      <div style={{ position:"relative", height:16, background:"#EEF5EE", borderRadius:8, marginBottom:10 }}>
        {/* 세그먼트 구분선 (트랙 위) */}
        {[25,55,80].map(pos => (
          <div key={pos} style={{
            position:"absolute", left:pos+"%", top:0, bottom:0,
            width:1, background:"rgba(255,255,255,0.7)", zIndex:1,
          }}/>
        ))}
        {/* Fill — moisture% 까지만 그라데이션 채움 */}
        <div style={{
          position:"absolute", left:0, top:0, bottom:0,
          width:moisture+"%",
          borderRadius:8,
          background:fillGradient,
          transition:"width 0.5s ease",
        }}/>
        {/* 마커 — fill 오른쪽 끝에 정확히 위치 */}
        <div style={{
          position:"absolute", top:"50%",
          left:"calc("+moisture+"% - 11px)",
          transform:"translateY(-50%)",
          width:22, height:22,
          background:"#fff",
          borderRadius:"50%",
          border:"3px solid "+fillColor,
          boxShadow:"0 2px 8px rgba(0,0,0,0.18), 0 0 0 3px "+fillColor+"22",
          zIndex:2,
          transition:"left 0.5s ease, border-color 0.3s",
        }}/>
      </div>

      {/* 단계 레이블 */}
      <div style={{ display:"flex" }}>
        {SEGMENTS.map((seg, i) => {
          const start = i === 0 ? 0 : SEGMENTS[i-1].end;
          const active = moisture > start && moisture <= seg.end;
          return (
            <div key={i} style={{ width:seg.end - start+"%", textAlign:"center" }}>
              <span style={{ fontSize:11, color: active ? seg.color : "#C4D4CA", fontWeight: active ? 800 : 400 }}>
                {seg.label}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── PLANT DETAIL ─────────────────────────────────────────────────────────────
function PlantDetailScreen({plant,waterLog,plantPhotos,onSetPhoto,onWater,onBack}){
  const [tab,setTab]=useState("info");
  const fileRef=useRef();
  const plantLog=waterLog.filter(l=>l.plantId===plant.id);
  const profilePhoto=plantPhotos[plant.id]||null;

  const handlePhotoChange=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>onSetPhoto(plant.id, ev.target.result);
    reader.readAsDataURL(file);
  };

  const headerBg="linear-gradient(160deg,"+plant.color+","+plant.color+"CC)";

  return(
    <div style={{height:"100%",minHeight:0,overflowY:"auto",background:"#F5F9E8",paddingBottom:80,position:"relative"}}>
      <div style={{background:headerBg,padding:"12px 20px 32px",position:"relative"}}>
        <div style={{marginBottom:20}}>
          <button onClick={onBack} className="bp" style={{background:"none",border:"none",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",lineHeight:1,padding:"0",display:"flex",alignItems:"center",gap:4}}>
            <Mi name="arrow_back_ios_new" size={22} color="#fff" />
          </button>
        </div>
        <div style={{display:"flex",alignItems:"flex-end",gap:16}}>
          <div style={{position:"relative",flexShrink:0}}>
            <div onClick={()=>fileRef.current.click()} style={{width:88,height:88,borderRadius:"50%",cursor:"pointer",border:"3px solid rgba(255,255,255,0.5)",background:profilePhoto?"transparent":"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>
              {profilePhoto?<img src={profilePhoto} alt="plant" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:46}}>{plant.emoji}</span>}
            </div>
            <button onClick={()=>fileRef.current.click()} className="bp" style={{position:"absolute",bottom:2,right:2,width:26,height:26,borderRadius:"50%",background:"#fff",border:"2px solid "+plant.color,color:plant.color,fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",lineHeight:1,boxShadow:"0 2px 6px rgba(0,0,0,0.18)"}}>+</button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoChange}/>
          <div style={{flex:1}}>
            <div style={{color:"rgba(255,255,255,0.75)",fontSize:12}}>{plant.name}</div>
            <div style={{color:"#fff",fontSize:26,fontWeight:800,marginTop:2}}>{plant.nickname}</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:12,marginTop:4}}>📍 {plant.location}</div>
          </div>
        </div>
        {plant.alerts.length>0&&(<div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>{plant.alerts.map((a,i)=><span key={i} style={{background:"rgba(255,255,255,0.25)",color:"#fff",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600}}>{a}</span>)}</div>)}
      </div>

      <div style={{padding:"20px 20px 80px"}}>
        <button onClick={onWater} className="bp" style={{width:"100%",background:"#4A7C00",color:"#fff",border:"none",borderRadius:16,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          💧 물주기 / 관리 기록하기
        </button>
        <div style={{background:"#fff",borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#2D5000",marginBottom:14}}>🌱 흙 수분 상태</div>
          <MoistureBar moisture={plant.moisture} />
        </div>
        <div style={{display:"flex",background:"#fff",borderRadius:16,padding:4,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
          {[{key:"info",label:"관리 정보"},{key:"log",label:"활동 "+plantLog.length},{key:"tags",label:"특성"}].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"10px 0",borderRadius:12,border:"none",background:tab===t.key?"#4A7C00":"transparent",color:tab===t.key?"#fff":"#7A9A3A",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>{t.label}</button>
          ))}
        </div>
        {tab==="info"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,animation:"fadeIn 0.3s ease"}}>
            {[{label:"물주기 주기",value:plant.water+"일마다",emoji:"💧"},{label:"마지막 물주기",value:plant.lastWatered+"일 전",emoji:"📅"},{label:"다음 물주기",value:"D-"+plant.nextWater,emoji:"⏰"},{label:"분갈이 주기",value:plant.repot+"일마다",emoji:"🪴"}].map((item,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                <div style={{fontSize:24,marginBottom:8}}>{item.emoji}</div>
                <div style={{fontSize:18,fontWeight:800,color:"#2D5000"}}>{item.value}</div>
                <div style={{fontSize:11,color:"#7A9A3A",marginTop:4}}>{item.label}</div>
              </div>
            ))}
          </div>
        )}
        {tab==="log"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            {plantLog.length===0?(
              <div style={{background:"#fff",borderRadius:20,padding:32,textAlign:"center"}}><div style={{marginBottom:12}}><Mi name="assignment" size={36} color="#B8C880" /></div><div style={{fontSize:14,color:"#7A9A3A"}}>아직 기록이 없어요</div></div>
            ):plantLog.map((log,i)=>(
              <div key={log.id} style={{background:"#fff",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",marginBottom:10}}>
                <span style={{fontSize:28}}>{log.memberAvatar}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#2D5000"}}>{log.memberName}</div>
                    <div style={{fontSize:11,color:"#B8C880"}}>{(()=>{const d=new Date(log.date);return isNaN(d)?"":((d.getMonth()+1)+"월 "+d.getDate()+"일");})()}</div>
                  </div>
                  <div style={{fontSize:12,color:"#5A7A00",marginTop:2}}>{log.action} · {log.time}</div>
                  {log.note?<div style={{fontSize:11,color:"#7A9A3A",marginTop:4,background:"#F5F9E8",borderRadius:8,padding:"4px 8px"}}>"{log.note}"</div>:null}
                </div>
              </div>
            ))}
          </div>
        )}
        {tab==="tags"&&(
          <div style={{background:"#fff",borderRadius:20,padding:20,animation:"fadeIn 0.3s ease"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {plant.tags.map((t,i)=><span key={i} style={{background:"#EEF7B0",color:"#2D5000",borderRadius:20,padding:"8px 16px",fontSize:13,fontWeight:600}}>{t}</span>)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADD PLANT (with 75-species search) ──────────────────────────────────────
function AddPlantScreen({step,setStep,onDone,onBack}){
  const [selDb,setSelDb]=useState(null);
  const [customMode,setCustomMode]=useState(false);
  const [customName,setCustomName]=useState("");
  const [customEmoji,setCustomEmoji]=useState("🌱");
  const [customTraits,setCustomTraits]=useState([]); // 선택한 특성 태그들
  const [customLight,setCustomLight]=useState("");
  const [query,setQuery]=useState("");
  const [catIdx,setCatIdx]=useState(0);
  const [nickname,setNickname]=useState("");
  const [location,setLocation]=useState("");
  const [waterDays,setWaterDays]=useState(7);

  // 커스텀 모드에서 step 0.5 = 특성 선택
  const [showTraits,setShowTraits]=useState(false);

  const EMOJI_OPTIONS=["🌱","🌿","🍃","🌳","🌵","🌴","🌸","🌺","🌼","🫒","🍋","🍅","🥬","🌷","🎋","🪴","🤍","🫙","🫛"];
  const TRAIT_OPTIONS=[
    {tag:"초보자용",emoji:"👶"},
    {tag:"공기정화",emoji:"💨"},
    {tag:"반음지",emoji:"🌤"},
    {tag:"직사광선",emoji:"☀️"},
    {tag:"물 적게",emoji:"💧"},
    {tag:"습도 높게",emoji:"🌫"},
    {tag:"반려동물 안전",emoji:"🐾"},
    {tag:"성장 빠름",emoji:"🚀"},
    {tag:"향기로움",emoji:"🌸"},
    {tag:"행운",emoji:"🍀"},
    {tag:"미세먼지 제거",emoji:"🌬"},
    {tag:"겨울 강함",emoji:"❄️"},
  ];
  const LIGHT_OPTIONS=["직사광선","밝은 간접광","반음지","음지"];

  const filtered=PLANT_DB.filter(p=>{
    const cat=PLANT_CATEGORIES[catIdx];
    const matchCat=cat.filter?cat.filter(p):true;
    const matchQ=query===""||p.name.toLowerCase().includes(query.toLowerCase());
    return matchCat&&matchQ;
  });

  const currentPlant = customMode
    ? (customName ? { name:customName, emoji:customEmoji, water:waterDays, tags:customTraits, light:customLight||"미설정" } : null)
    : selDb;

  const goNext = () => {
    if(customMode && !showTraits) { setShowTraits(true); return; }
    setShowTraits(false);
    setStep(1);
  };

  const STEP_LABELS=["식물 선택","별명 짓기","위치 설정","물주기 주기"];

  if(step===4){
    return(
      <div style={{height:"100%",minHeight:0,background:"#F5F9E8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,gap:24}}>
        <div style={{fontSize:80,animation:"sprout 1s ease"}}>{customMode?customEmoji:selDb?.emoji||"🌱"}</div>
        <div style={{color:"#2D5000",fontSize:26,fontWeight:800,textAlign:"center"}}>등록 완료!</div>
        <div style={{color:"#5A7A00",fontSize:15,textAlign:"center"}}>{nickname||(customMode?customName:selDb?.name)||"새 식물"}이/가 내 정원에 합류했어요 🎉</div>
        <button className="bp" onClick={onDone} style={{background:"#C8E85A",color:"#2D5000",border:"none",borderRadius:20,padding:"18px 48px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginTop:16}}>내 식물원 보기</button>
      </div>

    <div style={{height:"100%",minHeight:0,display:"flex",flexDirection:"column",background:"#F5F9E8"}}>

        <button onClick={showTraits?()=>setShowTraits(false):onBack} className="bp" style={{background:"none",border:"none",color:"rgba(255,255,255,0.85)",fontSize:13,fontWeight:600,cursor:"pointer",lineHeight:1,padding:"0",marginBottom:16,display:"flex",alignItems:"center",gap:4}}>
          <Mi name="arrow_back_ios_new" size={22} color="rgba(255,255,255,0.9)" />
        </button>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginBottom:4}}>
          {showTraits ? "직접 입력 — 특성 선택" : "STEP "+step+1+" / 4"}
        </div>
        <div style={{color:"#fff",fontSize:20,fontWeight:800}}>
          {showTraits ? "식물 특성 선택" : STEP_LABELS[step]}
        </div>
        {!showTraits&&<div style={{display:"flex",gap:4,marginTop:14}}>
          {[0,1,2,3].map(i=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?"#E4FF66":"rgba(255,255,255,0.25)"}}/>)}
        </div>}
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {step===0&&!showTraits&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {/* 모드 토글 탭 */}

              <button onClick={()=>{setCustomMode(false);}} style={{flex:1,padding:"10px 0",border:"none",background:"transparent",borderBottom:!customMode?"3px solid #2D6A4F":"3px solid transparent",color:!customMode?"#2D5000":"#7A9A3A",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>🌿 식물 DB 검색</button>
              <button onClick={()=>{setCustomMode(true);}} style={{flex:1,padding:"10px 0",border:"none",background:"transparent",borderBottom:customMode?"3px solid #2D6A4F":"3px solid transparent",color:customMode?"#2D5000":"#7A9A3A",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}><span style={{display:"flex",alignItems:"center",gap:4}}><Mi name="edit" size={14} />직접 입력</span></button>
            </div>

            {!customMode ? (
              <>
                <div style={{padding:"12px 16px 8px",background:"#fff",flexShrink:0}}>
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16}}><Mi name="search" size={20} color="#7A9A3A" /></span>

                      <button onClick={()=>setCustomMode(true)} style={{background:"#F3FAD0",color:"#4A7C00",border:"none",borderRadius:14,padding:"10px 20px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><span style={{display:"flex",alignItems:"center",gap:4}}><Mi name="edit" size={14} />직접 입력하기</span></button>

                  const sel=customTraits.includes(t.tag);
                  return(
                    <button key={t.tag} onClick={()=>setCustomTraits(prev=>sel?prev.filter(x=>x!==t.tag):[...prev,t.tag])} style={{background:sel?"#4A7C00":"#fff",color:sel?"#fff":"#5A7A00",border:"2px solid "+sel?"#4A7C00":"#E8F2B0",borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,transition:"all 0.15s"}}>
                      <span>{t.emoji}</span> {t.tag}
                    </button>
                  );
                })}

              <div style={{background:"#F5F9E8",borderRadius:12,padding:"10px 14px",marginBottom:16}}>
                <div style={{fontSize:11,color:"#5A7A00",fontWeight:600,marginBottom:6}}>선택된 특성</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {customTraits.map(t=><span key={t} style={{background:"#EEF7B0",color:"#2D5000",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>{t}</span>)}
                </div>
              </div>
            )}

            <button className="bp" onClick={()=>{setShowTraits(false);setStep(1);}} style={{width:"100%",background:"#4A7C00",color:"#fff",border:"none",borderRadius:16,padding:"16px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><span style={{display:"flex",alignItems:"center",gap:4}}>다음 단계로 <Mi name="arrow_forward" size={15} /></span></button>
          </div>
        )}

        {step===1&&(
          <div style={{flex:1,padding:"24px 20px 80px",overflowY:"auto",animation:"fadeIn 0.3s ease"}}>
            <div style={{background:"#F3FAD0",borderRadius:16,padding:"14px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>

                <div style={{fontSize:12,color:"#5A7A00"}}>{customMode?"직접 입력한 식물":"선택된 식물"}</div>
              </div>
            </div>
            <div style={{fontSize:14,color:"#5A7A00",marginBottom:16,fontWeight:600}}>나만의 별명을 지어주세요 ✨</div>
            <input value={nickname} onChange={e=>setNickname(e.target.value)}
              placeholder={"예: 초록이, "+(customMode?customName:selDb?.name)?.slice(0,3)||"몬순"+"이..."}
              style={{width:"100%",padding:"16px 20px",borderRadius:16,border:"2px solid #D8F3DC",background:"#fff",fontSize:16,color:"#2D5000",fontFamily:"inherit",outline:"none",marginBottom:8}}/>
            <div style={{fontSize:12,color:"#7A9A3A"}}>별명을 입력하지 않으면 식물 이름으로 등록돼요</div>
          </div>
        )}

        {step===2&&(
          <div style={{flex:1,padding:"24px 20px 80px",overflowY:"auto",animation:"fadeIn 0.3s ease"}}>
            <div style={{fontSize:14,color:"#5A7A00",marginBottom:16,fontWeight:600}}>어디에 두실 예정인가요?</div>
            {["거실 창가","침실","서재/책상","베란다","욕실","주방","현관"].map(loc=>(
              <button key={loc} onClick={()=>setLocation(loc)} style={{width:"100%",background:location===loc?"#4A7C00":"#fff",color:location===loc?"#fff":"#2D5000",border:"2px solid",borderColor:location===loc?"#4A7C00":"#E8F2B0",borderRadius:14,padding:"15px 20px",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left",fontFamily:"inherit",marginBottom:8,transition:"all 0.15s"}}>{loc}</button>
            ))}
          </div>
        )}

        {step===3&&(
          <div style={{flex:1,padding:"24px 20px 80px",overflowY:"auto",animation:"fadeIn 0.3s ease"}}>
            <div style={{fontSize:14,color:"#5A7A00",marginBottom:8,fontWeight:600}}>몇 일마다 물을 주시나요?</div>
            {!customMode&&selDb&&<div style={{fontSize:12,color:"#7A9A3A",marginBottom:20}}><Mi name="lightbulb" size={14} color="#F0A500" style={{marginRight:4}} /> {selDb.name}의 권장 주기는 {selDb.water}일이에요</div>}
            {customMode&&<div style={{fontSize:12,color:"#7A9A3A",marginBottom:20}}><Mi name="lightbulb" size={14} color="#F0A500" style={{marginRight:4}} /> 식물에 맞는 물주기 주기를 설정해주세요</div>}
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{fontSize:72,fontWeight:900,color:"#2D5000"}}>{waterDays}</div>
              <div style={{fontSize:16,color:"#5A7A00"}}>일마다 💧</div>
            </div>
            <input type="range" min={1} max={30} value={waterDays} onChange={e=>setWaterDays(Number(e.target.value))} style={{width:"100%",accentColor:"#4A7C00"}}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
              <span style={{fontSize:12,color:"#7A9A3A"}}>1일</span>
              <span style={{fontSize:12,color:"#7A9A3A"}}>30일</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:20}}>
              {[{d:3,label:"3일"},{d:7,label:"1주"},{d:14,label:"2주"}].map(q=>(
                <button key={q.d} onClick={()=>setWaterDays(q.d)} style={{background:waterDays===q.d?"#4A7C00":"#F5F9E8",color:waterDays===q.d?"#fff":"#5A7A00",border:"none",borderRadius:12,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{q.label}</button>
              ))}

        )}

      {step>0&&(
        <div style={{padding:"12px 20px 28px",flexShrink:0}}>
          <button className="bp" onClick={()=>setStep(step+1)}
            style={{width:"100%",background:(step===2&&!location)?"#B8C880":"#4A7C00",color:"#fff",border:"none",borderRadius:20,padding:"18px",fontSize:16,fontWeight:700,cursor:(step===2&&!location)?"default":"pointer",fontFamily:"inherit"}}>
            {step<3?"다음":"등록하기 🌱"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── CALENDAR + DIARY (MERGED) ────────────────────────────────────────────────
function CalendarDiaryScreen({plants,diaries,waterLog,onWriteDiary,onBack}){
  const [year,setYear]=useState(2026);
  const [month,setMonth]=useState(4);
  const [selDay,setSelDay]=useState(1);
  const [diaryExpanded,setDiaryExpanded]=useState(null);
  const [showPicker,setShowPicker]=useState(false);
  const days=["일","월","화","수","목","금","토"];

  const firstDay=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();

  // 월 이동
  const prevMonth=()=>{
    if(month===1){setYear(y=>y-1);setMonth(12);}
    else setMonth(m=>m-1);
    setSelDay(1);
  };
  const nextMonth=()=>{
    if(month===12){setYear(y=>y+1);setMonth(1);}
    else setMonth(m=>m+1);
    setSelDay(1);
  };

  // 스와이프 제스처 (캘린더 영역)
  const swipeRef=useRef(null);
  const swipeStartX=useRef(null);
  const handleCalTouchStart=(e)=>{swipeStartX.current=e.touches[0].clientX;};
  const handleCalTouchEnd=(e)=>{
    if(swipeStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-swipeStartX.current;
    if(Math.abs(dx)>50){dx<0?nextMonth():prevMonth();}
    swipeStartX.current=null;
  };

  const getDayStr=(day)=>year+"-"+String(month).padStart(2,"0")+"-"+String(day).padStart(2,"0");

  // #4 fix: 실제 nextWater 기반으로 해당 달의 예정일 계산
  const getPlantSchedule=()=>{
    const schedule={};
    plants.forEach(p=>{
      // nextWater는 "며칠 뒤" 숫자. 2026-04 기준 1일을 today로 가정
      const todayInMonth=1;
      const waterDay=todayInMonth+p.nextWater;
      if(waterDay>=1 && waterDay<=daysInMonth){
        if(!schedule[waterDay]) schedule[waterDay]=[];
        schedule[waterDay].push({type:"water",color:"#4A7C00",plant:p});
      }
      // 분갈이: repot 주기 기반 (단순 표시용)
      const repotDay=Math.round(p.repot/30);
      if(repotDay>=1 && repotDay<=daysInMonth){
        if(!schedule[repotDay]) schedule[repotDay]=[];
        schedule[repotDay].push({type:"repot",color:"#4C4CCC",plant:p});
      }
    });
    return schedule;
  };
  const plantSchedule=getPlantSchedule();
  const getDayDiaries=(day)=>diaries.filter(d=>d.calDate===getDayStr(day));
  const selDiaries=getDayDiaries(selDay);

  const selEvents=[
    {emoji:"💧",plant:"칼라데아 마코야나",label:"물주기",time:"오전 9:00",urgent:true,member:"👩 엄마"},
    {emoji:"🌿",plant:"몬스테라 델리시오사",label:"물주기 D-2",time:"오전 9:00",urgent:false,member:null},
    {emoji:"🌵",plant:"스투키",label:"흙 점검",time:"오전 10:00",urgent:false,member:"🧒 남동생"},
  ];

  // picker용 연/월 범위
  const PICKER_YEARS=Array.from({length:6},(_,i)=>2023+i);
  const PICKER_MONTHS=Array.from({length:12},(_,i)=>i+1);

  return(
    <div style={{height:"100%",minHeight:0,display:"flex",flexDirection:"column",background:"#F5F9E8",position:"relative"}}>
      {/* Header — flexShrink:0 ensures it never pushes BottomNav */}
      <div style={{background:"#2D5000",padding:"16px 20px 16px",flexShrink:0}}>
        <button onClick={onBack} className="bp" style={{background:"none",border:"none",color:"#1A2E00",fontSize:13,fontWeight:600,cursor:"pointer",lineHeight:1,padding:"0",marginBottom:16,display:"flex",alignItems:"center",gap:4}}>
          <Mi name="arrow_back_ios_new" size={22} color="rgba(255,255,255,0.9)" />
        </button>
        <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:700,letterSpacing:1.5,marginBottom:6}}>CALENDAR & DIARY</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          {/* 연/월 토글 버튼만 — 화살표 없음 */}
          <button onClick={()=>setShowPicker(v=>!v)} style={{background:"none",border:"none",color:"#fff",fontSize:22,fontWeight:800,cursor:"pointer",fontFamily:"inherit",padding:0,display:"flex",alignItems:"center",gap:6}}>
            {year}년 {month}월
            <span style={{fontSize:14,color:"#7A9A3A",fontWeight:400}}>{showPicker?"▲":"▼"}</span>
          </button>
          <button onClick={()=>onWriteDiary(getDayStr(selDay))} className="bp" style={{background:"#D4F06E",color:"#2D5000",border:"none",borderRadius:14,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><span style={{display:"flex",alignItems:"center",gap:4}}><Mi name="edit_note" size={15} />일기 쓰기</span></button>
        </div>

        {/* 연/월 퀵 피커 */}
        {showPicker&&(
          <div style={{marginTop:12,animation:"slideDown 0.2s ease"}}>
            <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
              {PICKER_YEARS.map(y=>(
                <button key={y} onClick={()=>{setYear(y);setSelDay(1);}} style={{background:year===y?"#D4F06E":"#F5F9E8",color:year===y?"#2D5000":"#7A9A3A",border:"none",borderRadius:10,padding:"5px 12px",fontSize:12,fontWeight:year===y?700:400,cursor:"pointer",fontFamily:"inherit"}}>
                  {y}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {PICKER_MONTHS.map(m=>(
                <button key={m} onClick={()=>{setMonth(m);setSelDay(1);setShowPicker(false);}} style={{background:month===m?"#D4F06E":"#F5F9E8",color:month===m?"#2D5000":"#7A9A3A",border:"none",borderRadius:10,padding:"5px 10px",fontSize:12,fontWeight:month===m?700:400,cursor:"pointer",fontFamily:"inherit",minWidth:36}}>
                  {m}월
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 스와이프 좌우 이동 힌트 (피커 열려있을 때 숨김) */}
      {!showPicker&&(
        <div style={{background:"#2D5000",padding:"0 20px 10px",flexShrink:0,display:"flex",gap:20,alignItems:"center"}}>
          <button onClick={prevMonth} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:20,padding:"4px 14px",color:"#fff",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}><Mi name="chevron_left" size={20} color="#5A7A00" /></button>
          <button onClick={nextMonth} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:20,padding:"4px 14px",color:"#fff",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}><Mi name="chevron_right" size={20} color="#5A7A00" /></button>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
        {/* Calendar — swipe to change month */}
        <div
          ref={swipeRef}
          onTouchStart={handleCalTouchStart}
          onTouchEnd={handleCalTouchEnd}
          style={{background:"#fff",margin:"12px 16px 0",borderRadius:20,padding:"14px 12px",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",userSelect:"none"}}
        >
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
            {days.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:"#7A9A3A",fontWeight:600,padding:"3px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
            {Array.from({length:daysInMonth}).map((_,i)=>{
              const day=i+1;
              const events=plantSchedule[day]||[];
              const dd=getDayDiaries(day);
              const isSel=day===selDay;
              return(
                <button key={day} onClick={()=>{setSelDay(day);setShowPicker(false);}} style={{aspectRatio:1,borderRadius:"50%",border:"none",background:isSel?"#4A7C00":"transparent",color:isSel?"#fff":"#2D5000",fontSize:13,fontWeight:isSel?700:400,cursor:"pointer",fontFamily:"inherit",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:1}}>
                  <span>{day}</span>
                  {(events.length>0||dd.length>0)&&(
                    <div style={{display:"flex",gap:1,position:"absolute",bottom:3}}>
                      {events.slice(0,1).map((e,ei)=><div key={"e"+ei} style={{width:4,height:4,borderRadius:"50%",background:isSel?"#C8E85A":e.color}}/>)}
                      {dd.length>0&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?"#FFD700":"#F59E0B"}}/>}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
          {/* Legend */}
          <div style={{display:"flex",gap:12,marginTop:10,padding:"6px 4px 0",borderTop:"1px solid #F0F7EE"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:"50%",background:"#4A7C00"}}/><span style={{fontSize:10,color:"#7A9A3A"}}>일정</span></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:"50%",background:"#F59E0B"}}/><span style={{fontSize:10,color:"#7A9A3A"}}>일기</span></div>
            <div style={{flex:1,textAlign:"right"}}><span style={{fontSize:10,color:"#C4D4CA"}}>← 스와이프로 월 이동</span></div>
          </div>
        </div>

        {/* Selected day label */}
        <div style={{padding:"16px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:15,fontWeight:800,color:"#2D5000"}}>{year}년 {month}월 {selDay}일</div>
          <button onClick={()=>onWriteDiary(getDayStr(selDay))} style={{background:"none",border:"none",fontSize:12,color:"#5A7A00",cursor:"pointer",fontFamily:"inherit"}}>+ 일기 추가</button>
        </div>

        {/* Schedule events */}
        <div style={{padding:"0 16px",marginTop:4}}>
          <div style={{fontSize:12,fontWeight:700,color:"#7A9A3A",marginBottom:10,padding:"0 4px"}}>🗓 일정</div>
          {selEvents.map((e,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",marginBottom:10,animation:"fadeIn 0.3s ease "+i*0.05+"s both"}}>
              <span style={{fontSize:26}}>{e.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#2D5000"}}>{e.plant}</div>
                <div style={{fontSize:11,color:"#5A7A00",marginTop:2}}>{e.label} · {e.time}{e.member?" · "+e.member:""}</div>
              </div>
              {e.urgent&&<button className="bp" style={{background:"#4A7C00",color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>완료</button>}
            </div>
          ))}
        </div>

        {/* Diary entries */}
        <div style={{padding:"12px 16px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,padding:"0 4px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#7A9A3A"}}>📝 이 날의 일기 {selDiaries.length>0?"("+selDiaries.length+")":""}</div>
          </div>
          {selDiaries.length===0?(
            <button onClick={()=>onWriteDiary(getDayStr(selDay))} style={{width:"100%",background:"transparent",border:"2px dashed #B7E4C7",borderRadius:16,padding:"20px",textAlign:"center",cursor:"pointer",fontFamily:"inherit"}}>
              <div style={{fontSize:28,marginBottom:8}}>📝</div>
              <div style={{fontSize:13,color:"#7A9A3A"}}>오늘의 식물 이야기를 기록해보세요</div>
            </button>
          ):(
            selDiaries.map((entry,i)=>{
              const plant=plants.find(p=>p.id===entry.plantId);
              const isExp=diaryExpanded===entry.id;
              return(
                <div key={entry.id} style={{background:"#fff",borderRadius:18,padding:18,marginBottom:10,boxShadow:"0 3px 12px rgba(0,0,0,0.06)",animation:"fadeIn 0.3s ease "+i*0.08+"s both"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isExp?12:0}}>
                    <span style={{fontSize:24}}>{entry.memberAvatar}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#4A7C00"}}>{entry.memberName}</div>
                      {plant&&<div style={{fontSize:11,color:"#7A9A3A"}}>{plant.emoji} {plant.nickname}</div>}
                    </div>
                    <button onClick={()=>setDiaryExpanded(isExp?null:entry.id)} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:"#7A9A3A",padding:4}}>
                      {isExp?"▲":"▼"}
                    </button>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#2D5000",marginTop:isExp?0:8}}>{entry.title}</div>
                  {isExp&&<div style={{fontSize:13,color:"#5A7A00",lineHeight:1.6,marginTop:8}}>{entry.content}</div>}
                  {isExp&&entry.photos&&entry.photos.length>0&&(
                    <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
                      {entry.photos.map((ph,pi)=>(
                        <img key={pi} src={ph.dataUrl} alt="" style={{width:80,height:80,borderRadius:12,objectFit:"cover",boxShadow:"0 2px 8px rgba(0,0,0,0.10)"}}/>
                      ))}
                    </div>
                  )}
                </div>
              );
            })
          )}
          {selDiaries.length===0&&diaries.length>0&&(
            <div style={{marginTop:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#7A9A3A",marginBottom:10,padding:"0 4px"}}>📖 최근 일기</div>
              {diaries.slice(0,3).map((entry,i)=>{
                const plant=plants.find(p=>p.id===entry.plantId);
                return(
                  <div key={entry.id} style={{background:"#fff",borderRadius:16,padding:"14px 16px",marginBottom:8,display:"flex",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",animation:"fadeIn 0.3s ease "+i*0.06+"s both"}}>
                    <span style={{fontSize:24}}>{entry.memberAvatar}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#2D5000"}}>{entry.title}</div>
                        <div style={{fontSize:11,color:"#B8C880"}}>{entry.calDate?.slice(5).replace("-",".")}</div>
                      </div>
                      <div style={{fontSize:11,color:"#7A9A3A",marginTop:2}}>{entry.memberName} · {plant?.emoji} {plant?.nickname}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── DIARY WRITE ──────────────────────────────────────────────────────────────
function DiaryWriteScreen({plants,prefillDate,onBack,onSave}){
  const [title,setTitle]=useState("");
  const [content,setContent]=useState("");
  const [selPlant,setSelPlant]=useState(null);
  const [condition,setCondition]=useState("");
  const [photos,setPhotos]=useState([]);
  const fileRef=useRef();

  const handlePhotoAdd=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        setPhotos(prev=>[...prev,{id:Date.now()+Math.random(),dataUrl:ev.target.result}]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };

  const removePhoto=(id)=>setPhotos(prev=>prev.filter(p=>p.id!==id));

  const handleSave=()=>{
    onSave({

// ─── FAMILY ───────────────────────────────────────────────────────────────────
function FamilyScreen({members,onRemoveMember,FC,IL,waterLog,plants,onJoin,onBack}){
  const [tab,setTab]=useState("members");
  const fmtActivityDate=(isoStr)=>{
    if(!isoStr) return "";
    const d=new Date(isoStr);
    if(isNaN(d)) return "";
    const diff=Math.floor((BASE_NOW-d)/86400000);
    if(diff===0) return "오늘";
    if(diff===1) return "어제";
    return (d.getMonth()+1)+"월 "+d.getDate()+"일";
  };
  const memberActivity=members.map(m=>({...m,logs:waterLog.filter(l=>l.memberId===m.id)}));
  const AC={"물주기":{bg:"#F3FAD0",dot:"#6AAF00"},"흙 점검":{bg:"#FFF8E8",dot:"#F0A500"},"분갈이":{bg:"#F0F0FF",dot:"#6060CC"}};
  return(
    <div style={{height:"100%",minHeight:0,overflowY:"auto",background:"#F5F9E8",paddingBottom:80,position:"relative"}}>
      <ScreenHeader onBack={onBack} sub="FAMILY GARDEN" label="가족 정원" bg="#2D5000" dark={true} />
      <div style={{padding:"16px 20px 80px"}}>
        <div style={{display:"flex",background:"#fff",borderRadius:16,padding:4,marginBottom:20,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
          {[{key:"members",label:"가족 멤버"},{key:"activity",label:"활동 피드"},{key:"invite",label:"초대하기"}].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"10px 0",borderRadius:12,border:"none",background:tab===t.key?"#4A7C00":"transparent",color:tab===t.key?"#fff":"#7A9A3A",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>{t.label}</button>
          ))}
        </div>
        {tab==="members"&&memberActivity.map((m,i)=>(
          <div key={m.id} style={{background:"#fff",borderRadius:20,padding:18,marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",animation:"fadeIn 0.3s ease "+i*0.07+"s both"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:m.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:"2px solid "+m.color+"44"}}>{m.avatar}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:"#2D5000"}}>{m.name}</div>
                <div style={{fontSize:11,color:"#7A9A3A"}}>참여: {m.joined}</div>
              </div>
              {m.role==="owner"
                ? <span style={{background:"#FFF3CD",color:"#856404",borderRadius:8,padding:"3px 10px",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><Mi name="workspace_premium" size={13} color="inherit" />Owner</span>
                : <button onClick={()=>onRemoveMember(m.id)} className="bp" style={{background:"#FFF0F0",color:"#E85555",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>내보내기</button>
              }
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[{label:"물주기",value:m.logs.filter(l=>l.action==="물주기").length,emoji:"💧"},{label:"흙 점검",value:m.logs.filter(l=>l.action==="흙 점검").length,emoji:"🌍"},{label:"분갈이",value:m.logs.filter(l=>l.action==="분갈이").length,emoji:"🪴"}].map((s,si)=>(
                <div key={si} style={{background:"#F5F9E8",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                  <div style={{fontSize:16}}>{s.emoji}</div>
                  <div style={{fontSize:16,fontWeight:800,color:"#2D5000"}}>{s.value}</div>
                  <div style={{fontSize:9,color:"#7A9A3A"}}>{s.label}</div>
                </div>
              ))}
            </div>
            {m.logs.length>0&&(()=>{const plant=plants.find(p=>p.id===m.logs[0].plantId);return <div style={{marginTop:12,background:"#F8FCF8",borderRadius:10,padding:"8px 12px"}}><div style={{fontSize:11,color:"#7A9A3A"}}>최근 활동</div><div style={{fontSize:12,color:"#4A7C00",fontWeight:600,marginTop:2}}>{plant?.emoji} {plant?.nickname} {m.logs[0].action} · {m.logs[0].date}</div></div>;})()}
          </div>
        ))}
        {tab==="activity"&&waterLog.map((log,i)=>{

              <div style={{flex:1}}>

                <div style={{fontSize:12,color:"#5A7A00",marginTop:2}}><span style={{background:ac.bg,color:ac.dot,borderRadius:6,padding:"1px 6px",fontWeight:700,marginRight:4,fontSize:11}}>{log.action}</span>{plant?.emoji} {plant?.nickname}</div>
                {log.note?<div style={{fontSize:11,color:"#7A9A3A",marginTop:6,fontStyle:"italic"}}>💬 "{log.note}"</div>:null}
              </div>
            </div>
          );
        })}
        {tab==="invite"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={{background:"#fff",borderRadius:20,padding:24,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
              <div style={{color:"#4A7C00",fontSize:12,fontWeight:600,marginBottom:6}}><span style={{display:"flex",alignItems:"center",gap:4}}><Mi name="key" size={13} color="#4A7C00" />초대 코드</span></div>
              <div style={{color:"#5A7A00",fontSize:13,marginBottom:20,lineHeight:1.5}}>가족에게 이 코드를 알려주세요. 앱 → 마이페이지 → 참여하기에서 입력하면 돼요.</div>
              <div style={{background:"#fff",borderRadius:16,padding:"20px",textAlign:"center",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <div style={{color:"#888",fontSize:11,marginBottom:8}}>나의 가족 정원 코드</div>
                <div style={{color:"#1A2E00",fontSize:30,fontWeight:900,letterSpacing:6}}>{FC}</div>
              </div>
              <button className="bp" style={{width:"100%",background:"#1A2E00",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><span style={{display:"flex",alignItems:"center",gap:6}}><Mi name="content_copy" size={15} color="inherit" />코드 복사하기</span></button>
            </div>
            <div style={{background:"#fff",borderRadius:20,padding:20,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:14,fontWeight:700,color:"#2D5000",marginBottom:6}}>🔗 초대 링크</div>
              <div style={{fontSize:12,color:"#7A9A3A",marginBottom:14}}>링크를 탭하면 자동으로 앱에서 열려요</div>
              <div style={{background:"#F8F9FA",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:12,border:"1px solid #E8EEE0"}}>
                <span style={{fontSize:18}}>🌿</span>
                <div style={{fontSize:12,color:"#4A7C00",fontWeight:600,flex:1,wordBreak:"break-all"}}>{IL}</div>
                <button className="bp" style={{background:"#F3FAD0",color:"#4A7C00",border:"none",borderRadius:10,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>복사</button>
              </div>
            </div>
            <button onClick={onJoin} className="bp" style={{width:"100%",background:"transparent",border:"2px dashed #B8C880",borderRadius:20,padding:"16px",fontSize:14,fontWeight:700,color:"#4A7C00",cursor:"pointer",fontFamily:"inherit"}}>🌿 다른 가족 정원 코드 입력하기</button>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>JOIN GARDEN</div>
        <div style={{color:"#fff",fontSize:22,fontWeight:800}}>가족 정원 참여</div>
      </div>
      <div style={{flex:1,padding:24,display:"flex",flexDirection:"column",gap:20}}>
        <div style={{background:"#fff",borderRadius:24,padding:24,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:36,textAlign:"center",marginBottom:16}}>🔑</div>
          <div style={{fontSize:15,fontWeight:700,color:"#2D5000",textAlign:"center",marginBottom:6}}>초대 코드 입력</div>
          <div style={{fontSize:13,color:"#7A9A3A",textAlign:"center",marginBottom:20}}>가족에게 받은 코드를 입력해주세요</div>
          <input value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setError("");}} placeholder="예: PLANT-7842" style={{width:"100%",padding:"16px 20px",borderRadius:16,border:"2px solid "+error?"#FF6B6B":"#EEF7B0",background:"#F8FCF8",fontSize:18,fontWeight:700,color:"#2D5000",fontFamily:"inherit",outline:"none",textAlign:"center",letterSpacing:3}}/>
          {error&&<div style={{color:"#FF6B6B",fontSize:12,textAlign:"center",marginTop:8}}>{error}</div>}
        </div>
        <div style={{background:"#fff",borderRadius:20,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#2D5000",marginBottom:8}}>또는 링크로 참여</div>
          <div style={{fontSize:12,color:"#7A9A3A",marginBottom:12}}>가족이 공유한 초대 링크를 붙여넣기 하세요</div>
          <input placeholder="restinplant.app/join/..." style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"2px solid #E0EEE4",background:"#F8FCF8",fontSize:12,color:"#2D5000",fontFamily:"inherit",outline:"none"}}/>
        </div>
        <button onClick={handleVerify} className="bp" style={{background:code.length>0?"#4A7C00":"#B8C880",color:"#fff",border:"none",borderRadius:20,padding:"18px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"background 0.3s"}}><span style={{display:"flex",alignItems:"center",gap:4}}>정원 찾기 <Mi name="arrow_forward" size={15} /></span></button>
      </div>
    </div>
  );
}

function WaterModal({plantId,plants,members,onClose,onSave}){
  const plant=plants.find(p=>p.id===plantId);
  const [action,setAction]=useState("물주기");
  const [note,setNote]=useState("");
  const [member,setMember]=useState(members[0]);
  const ACTIONS=[{label:"물주기",emoji:"💧"},{label:"흙 점검",emoji:"🌍"},{label:"분갈이",emoji:"🪴"},{label:"영양제",emoji:"💊"},{label:"가지치기",emoji:"✂️"}];
  const handleSave=()=>onSave({id:Date.now(),plantId,memberId:member.id,memberName:member.name,memberAvatar:member.avatar,action,date:"방금",time:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),note});
  return(
    <div style={{position:"absolute",inset:0,zIndex:100}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",animation:"overlayIn 0.2s ease"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#fff",borderRadius:"28px 28px 0 0",padding:"24px 20px 40px",animation:"modalIn 0.3s ease"}}>
        <div style={{width:40,height:4,background:"#D1E8D1",borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <span style={{fontSize:40}}>{plant?.emoji}</span>
          <div><div style={{fontSize:18,fontWeight:800,color:"#2D5000"}}>{plant?.nickname}</div><div style={{fontSize:12,color:"#7A9A3A"}}>관리 기록 남기기</div></div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#5A7A00",marginBottom:8}}>누가 했나요?</div>
          <div style={{display:"flex",gap:8}}>
            {members.map(m=>(
              <button key={m.id} onClick={()=>setMember(m)} style={{flex:1,background:member.id===m.id?"#4A7C00":"#F5F9E8",color:member.id===m.id?"#fff":"#2D5000",border:"none",borderRadius:14,padding:"10px 4px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <span style={{fontSize:22}}>{m.avatar}</span>
                {m.name.split(" ")[0]}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#5A7A00",marginBottom:8}}>무엇을 했나요?</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {ACTIONS.map(a=><button key={a.label} onClick={()=>setAction(a.label)} style={{background:action===a.label?"#4A7C00":"#F5F9E8",color:action===a.label?"#fff":"#2D5000",border:"none",borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{a.emoji} {a.label}</button>)}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:"#5A7A00",marginBottom:8}}>메모 (선택)</div>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="예: 흙이 건조해서 충분히 줬어요..." style={{width:"100%",padding:"12px 16px",borderRadius:14,border:"2px solid #E0EEE4",background:"#F8FCF8",fontSize:13,color:"#2D5000",fontFamily:"inherit",outline:"none"}}/>
        </div>
        <button onClick={handleSave} className="bp" style={{width:"100%",background:"#4A7C00",color:"#fff",border:"none",borderRadius:18,padding:"16px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✅ 기록 저장하기</button>
      </div>
    </div>
  );
}
